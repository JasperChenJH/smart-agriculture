<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>阿里云TTS WebSocket测试工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #f0f0f0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 20px 0;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(79, 172, 254, 0.5);
        }

        .subtitle {
            color: #a0aec0;
            font-size: 1.1rem;
        }

        .panel-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .panel {
            background: rgba(30, 41, 59, 0.7);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            flex: 1;
            min-width: 300px;
        }

        .panel-title {
            font-size: 1.5rem;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: #63b3ed;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .control-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #cbd5e0;
        }

        input[type="text"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(74, 85, 104, 0.5);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
        }

        textarea {
            min-height: 150px;
            resize: vertical;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #4299e1;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.3);
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(30, 41, 59, 0.9);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        #connectBtn {
            background: linear-gradient(90deg, #0ba360, #3cba92);
        }

        #disconnectBtn {
            background: linear-gradient(90deg, #ff416c, #ff4b2b);
        }

        #sendBtn {
            background: linear-gradient(90deg, #2193b0, #6dd5ed);
        }

        #clearLogBtn {
            background: linear-gradient(90deg, #7f00ff, #e100ff);
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        input[type="range"] {
            flex: 1;
            height: 5px;
            border-radius: 5px;
            background: rgba(15, 23, 42, 0.7);
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #4299e1;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(66, 153, 225, 0.5);
        }

        .status-container {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 10px;
            margin-top: 10px;
            border: 1px solid rgba(74, 85, 104, 0.3);
        }

        .status-indicator {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: #f56565;
        }

        .status-indicator.connected {
            background: #48bb78;
            box-shadow: 0 0 10px rgba(72, 187, 120, 0.5);
        }

        .audio-player {
            width: 100%;
            margin-top: 15px;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 10px;
            padding: 15px;
        }

        .audio-player audio {
            width: 100%;
            filter: drop-shadow(0 0 10px rgba(66, 153, 225, 0.3));
        }

        .log-container {
            background: rgba(30, 41, 59, 0.7);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            height: 300px;
            overflow-y: auto;
        }

        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        #logContent {
            font-family: 'Consolas', monospace;
            font-size: 0.9rem;
            white-space: pre-wrap;
        }

        .log-entry {
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            background: rgba(15, 23, 42, 0.5);
        }

        .log-time {
            color: #a0aec0;
            font-size: 0.8rem;
            margin-bottom: 5px;
        }

        .log-info {
            color: #63b3ed;
        }

        .log-success {
            color: #68d391;
        }

        .log-warning {
            color: #f6e05e;
        }

        .log-error {
            color: #fc8181;
        }

        .session-id {
            font-family: monospace;
            background: rgba(45, 55, 72, 0.6);
            padding: 3px 6px;
            border-radius: 4px;
            word-break: break-all;
        }

        .connection-details {
            margin-top: 20px;
            padding: 15px;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 10px;
            font-family: monospace;
            font-size: 0.9rem;
            white-space: pre-wrap;
        }

        @media (max-width: 768px) {
            .controls {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="panel-container">
        <div class="panel">
            <h2 class="panel-title">参数配置</h2>
            <div class="controls">
                <div class="control-group">
                    <label for="speaker">语音角色</label>
                    <select id="speaker">
                        <option value="sijia">思佳 - 标准女声</option>
                        <option value="chuangirl">小玥 - 四川话女声</option>
                        <option value="zhifeng_emo">知锋_多情感 - 多种情感男声</option>
                        <option value="zhimiao_emo">知妙_多情感 - 多种情感女声</option>
                        <option value="ruoxi">若兮 - 优雅女声</option>
                        <option value="abin">阿斌 - 广东普通话</option>

                    </select>
                </div>
                <div class="control-group">
                    <label for="pitch">音调(-500~500)</label>
                    <div class="slider-container">
                        <input id="pitchSlider" max="500" min="-500" type="range" value="0">
                        <input id="pitch" type="number" value="0">
                    </div>
                </div>
                <div class="control-group">
                    <label for="rate">语速(-500~500)</label>
                    <div class="slider-container">
                        <input id="rateSlider" max="500" min="-500" type="range" value="0">
                        <input id="rate" type="number" value="0">
                    </div>
                </div>
                <div class="control-group">
                    <label for="volume">音量(0~100)</label>
                    <div class="slider-container">
                        <input id="volumeSlider" max="100" min="0" type="range" value="100">
                        <input id="volume" type="number" value="100">
                    </div>
                </div>
            </div>

            <div class="status-container">
                <div class="status-indicator" id="statusIndicator"></div>
                <div>连接状态: <span id="statusText">已断开</span></div>
            </div>

            <div class="button-group">
                <button id="connectBtn">
                    <i class="icon">🔌</i> 连接WebSocket
                </button>
                <button disabled id="disconnectBtn">
                    <i class="icon">❌</i> 断开连接
                </button>
            </div>

            <div class="connection-details">
                WebSocket URL: ws://localhost:8080/ws/tts
            </div>
        </div>

        <div class="panel">
            <h2 class="panel-title">文本合成</h2>
            <div class="control-group">
                <label for="textInput">待合成文本</label>
                <textarea id="textInput" placeholder="输入需要转换为语音的文本...">欢迎使用阿里云语音合成服务，这是一个WebSocket实现的文本转语音工具演示。</textarea>
            </div>

            <div class="button-group">
                <button disabled id="sendBtn">
                    <i class="icon">🎤</i> 生成语音
                </button>
                <button id="clearLogBtn">
                    <i class="icon">🧹</i> 清除日志
                </button>
            </div>

            <div class="audio-player">
                <label>合成结果播放器</label>
                <audio controls id="audioPlayer"></audio>
            </div>
        </div>
    </div>

    <div class="log-container">
        <div class="log-header">
            <h2 class="panel-title">事件日志</h2>
        </div>
        <div id="logContent"></div>
    </div>
</div>

<script>
    // DOM元素
    const connectBtn = document.getElementById('connectBtn');
    const disconnectBtn = document.getElementById('disconnectBtn');
    const sendBtn = document.getElementById('sendBtn');
    const clearLogBtn = document.getElementById('clearLogBtn');
    const statusIndicator = document.getElementById('statusIndicator');
    const statusText = document.getElementById('statusText');
    const audioPlayer = document.getElementById('audioPlayer');
    const logContent = document.getElementById('logContent');

    // 参数元素
    const speakerSelect = document.getElementById('speaker');
    const pitchInput = document.getElementById('pitch');
    const rateInput = document.getElementById('rate');
    const volumeInput = document.getElementById('volume');
    const textInput = document.getElementById('textInput');

    // 滑动条
    const pitchSlider = document.getElementById('pitchSlider');
    const rateSlider = document.getElementById('rateSlider');
    const volumeSlider = document.getElementById('volumeSlider');

    // WebSocket连接
    let webSocket = null;
    let sessionId = null;
    let audioChunks = [];

    // 更新状态显示
    function updateStatus(connected) {
        statusIndicator.className = 'status-indicator';
        if (connected) {
            statusIndicator.classList.add('connected');
            statusText.textContent = '已连接';
            statusText.style.color = '#68d391';
            connectBtn.disabled = true;
            disconnectBtn.disabled = false;
            sendBtn.disabled = false;
        } else {
            statusText.textContent = '已断开';
            statusText.style.color = '#fc8181';
            connectBtn.disabled = false;
            disconnectBtn.disabled = true;
            sendBtn.disabled = true;
            audioChunks = [];
            sessionId = null;
        }
    }

    // 添加日志条目
    function addLogEntry(message, type = 'info') {
        const now = new Date();
        const timestamp = now.toLocaleTimeString();
        const typeClass = `log-${type}`;

        const logEntry = document.createElement('div');
        logEntry.className = 'log-entry';

        const timeDiv = document.createElement('div');
        timeDiv.className = 'log-time';
        timeDiv.textContent = `[${timestamp}]`;

        const messageDiv = document.createElement('div');
        messageDiv.className = typeClass;
        messageDiv.textContent = message;

        logEntry.appendChild(timeDiv);
        logEntry.appendChild(messageDiv);
        logContent.appendChild(logEntry);

        // 自动滚动
        logContent.scrollTop = logContent.scrollHeight;
    }

    // 连接WebSocket
    function connectWebSocket() {
        // 检查是否已连接
        if (webSocket && webSocket.readyState === WebSocket.OPEN) {
            addLogEntry('连接已存在，无需重新连接', 'warning');
            return;
        }

        // 配置参数
        const speaker = speakerSelect.value;
        const pitch = pitchInput.value;
        const rate = rateInput.value;
        const volume = volumeInput.value;

        // 构建WebSocket URL
        const IP = window.location.hostname || '127.0.0.1';
        const port = window.location.port || '8080';
        const baseUrl = 'ws://' + IP + ':' + port + '/ws/tts';
        const params = `?speaker=${speaker}&pitch=${pitch}&rate=${rate}&volume=${volume}`;
        const wsUrl = baseUrl + params;

        addLogEntry(`正在连接WebSocket: ${wsUrl}`);

        // 创建WebSocket连接
        webSocket = new WebSocket(wsUrl);

        // 连接成功事件
        webSocket.onopen = function (event) {
            addLogEntry('WebSocket连接已建立', 'success');
            updateStatus(true);
        };

        // 接收消息事件
        webSocket.onmessage = function (event) {
            try {
                // 处理二进制消息（音频数据）
                if (event.data instanceof Blob) {
                    addLogEntry('收到二进制音频数据', 'info');

                    // 添加到音频片段数组
                    audioChunks.push(event.data);
                }
                // 处理文本消息
                else if (typeof event.data === 'string') {
                    const message = JSON.parse(event.data);

                    if (message.type === 'session') {
                        sessionId = message.sessionId;
                        addLogEntry(`会话已建立 - Session ID: `, 'success');
                        addLogEntry(`Session ID: ${sessionId}`, 'info');
                        addLogEntry(`采样率: ${message.sampleRate}Hz`, 'info');
                    } else if (message.type === 'synthesis_start') {
                        addLogEntry(`开始合成语音 (Session ID: ${message.sessionId})`, 'info');
                        audioChunks = []; // 重置音频缓冲区
                    } else if (message.type === 'synthesis_complete') {
                        addLogEntry(`语音合成完成 (Session ID: ${message.sessionId})`, 'success');

                        // 组合所有音频片段并播放
                        if (audioChunks.length > 0) {
                            const audioBlob = new Blob(audioChunks, {type: 'audio/mp3'});
                            const audioUrl = URL.createObjectURL(audioBlob);

                            audioPlayer.src = audioUrl;
                            audioPlayer.play().catch(e => {
                                addLogEntry(`音频播放失败: ${e}`, 'error');
                            });

                            addLogEntry('已生成语音文件', 'success');
                        }
                    } else if (message.type === 'synthesis_error') {
                        addLogEntry(`语音合成错误: ${message.message} (Code: ${message.code})`, 'error');
                    }
                }
            } catch (e) {
                addLogEntry(`处理消息出错: ${e.message}`, 'error');
            }
        };

        // 连接关闭事件
        webSocket.onclose = function (event) {
            addLogEntry(`WebSocket连接已关闭 (Code: ${event.code})`, 'info');
            updateStatus(false);
        };

        // 连接错误事件
        webSocket.onerror = function (error) {
            addLogEntry(`WebSocket错误: ${error.message || '未知错误'}`, 'error');
            updateStatus(false);
        };
    }

    // 断开WebSocket
    function disconnectWebSocket() {
        if (webSocket) {
            addLogEntry('正在断开WebSocket连接...', 'info');
            webSocket.close();
            webSocket = null;
        } else {
            addLogEntry('没有活跃的WebSocket连接', 'warning');
        }
    }

    // 发送文本进行合成
    function sendTextForSynthesis() {
        if (!webSocket || webSocket.readyState !== WebSocket.OPEN) {
            addLogEntry('WebSocket连接未建立', 'error');
            return;
        }

        const text = textInput.value.trim();
        if (!text) {
            addLogEntry('请输入要合成的文本', 'error');
            return;
        }

        const payload = JSON.stringify({text: text});
        addLogEntry(`发送合成请求: ${text}`);

        webSocket.send(payload);
    }

    // 绑定滑动条和输入框
    function setupParameterControls() {
        // 音调控制
        pitchSlider.addEventListener('input', () => {
            pitchInput.value = pitchSlider.value;
        });
        pitchInput.addEventListener('change', () => {
            const value = Math.max(-500, Math.min(500, parseInt(pitchInput.value) || 0));
            pitchInput.value = value;
            pitchSlider.value = value;
        });

        // 语速控制
        rateSlider.addEventListener('input', () => {
            rateInput.value = rateSlider.value;
        });
        rateInput.addEventListener('change', () => {
            const value = Math.max(-500, Math.min(500, parseInt(rateInput.value) || 0));
            rateInput.value = value;
            rateSlider.value = value;
        });

        // 音量控制
        volumeSlider.addEventListener('input', () => {
            volumeInput.value = volumeSlider.value;
        });
        volumeInput.addEventListener('change', () => {
            const value = Math.max(0, Math.min(100, parseInt(volumeInput.value) || 100));
            volumeInput.value = value;
            volumeSlider.value = value;
        });
    }

    // 初始化
    function init() {
        // 绑定按钮事件
        connectBtn.addEventListener('click', connectWebSocket);
        disconnectBtn.addEventListener('click', disconnectWebSocket);
        sendBtn.addEventListener('click', sendTextForSynthesis);
        clearLogBtn.addEventListener('click', () => {
            logContent.innerHTML = '';
            addLogEntry('日志已清除', 'info');
        });

        // 设置参数控制
        setupParameterControls();

        // 初始状态
        updateStatus(false);
        addLogEntry('准备连接...', 'info');

        // 添加示例日志
        addLogEntry('此工具测试阿里云TTS服务的WebSocket实现', 'info');
        addLogEntry('1. 配置语音参数并连接WebSocket', 'info');
        addLogEntry('2. 输入文本并点击"生成语音"', 'info');
        addLogEntry('3. 接收并播放合成的语音', 'info');
    }

    // 页面加载完成后初始化
    window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
